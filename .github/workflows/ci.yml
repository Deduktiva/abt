name: Continuous Integration

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  # No base-branch filter: run on every PR regardless of its target. This keeps
  # stacked PRs (base != main) covered, and means an automatic retarget to main
  # (which fires only an `edited` event, not a default trigger) can't leave a PR
  # without CI — the checks are already attached to the head commit.
  pull_request:

jobs:
  rails-test:
    name: Rails tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: abt_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Ruby
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
      with:
        bundler-cache: true

    # Cache only the apache.org download (the pdf-images extra jars), not the
    # apt packages. Keyed on the fetch script so a version bump invalidates it.
    - name: Cache FOP pdf-images jars
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: vendor/fop-pdf-images-*-bin.tar.gz
        key: fop-pdf-images-${{ hashFiles('bin/fetch-fop-extra-jars') }}

    - name: Fetch FOP pdf-images jars
      run: ./bin/fetch-fop-extra-jars

    - name: Build FOP Docker container
      run: |
        podman build -f Dockerfile.fop -t abt-fop .

    - name: Configure test environment
      run: |
        echo "$PWD/bin" >> $GITHUB_PATH
        cp config/database.yml.sample config/database.yml
        ./bin/abt-fop-container -version

    - name: Setup database
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/abt_test
      run: |
        bundle exec rails db:create
        bundle exec rails db:migrate
        bundle exec rails db:seed

    - name: Verify development seeds
      env:
        RAILS_ENV: development
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/abt_development
      run: |
        bundle exec rails db:create
        bundle exec rails db:migrate
        bundle exec rails db:seed

    - name: Run tests
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/abt_test
        RAILS_LOG_LEVEL: debug
        COVERAGE: "1"
        COVERAGE_COMMAND: unit
      run: |
        bundle exec rails test --verbose

    - name: Run UI tests
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/abt_test
        RAILS_LOG_LEVEL: debug
        COVERAGE: "1"
        COVERAGE_COMMAND: system
      run: |
        HEADLESS=1 bundle exec rails test:system --verbose

    # The system run merges its results with the unit run's (same coverage/ dir)
    # and rewrites coverage/coverage.xml, so this uploads the combined report.
    # Runs even if a test step failed so partial coverage still lands.
    - name: Upload coverage to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: ./coverage/coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  brakeman:
    name: Brakeman
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Ruby
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
      with:
        bundler-cache: true

    - name: Run Brakeman
      run: bundle exec brakeman --no-pager --exit-on-warn --exit-on-error

  stimulus-memory-leak-check:
    name: Stimulus Memory Leak Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Check Stimulus controllers for event listener leaks
      run: npm run lint

  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Ruby
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
      with:
        bundler-cache: true

    - name: Run pre-commit hooks
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
