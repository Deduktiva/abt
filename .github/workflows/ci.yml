name: Continuous Integration

permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  rails-test:
    name: Rails tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby-version: ['3.3']

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: abt_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v6

    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - name: Build FOP Docker container
      run: |
        podman build -f Dockerfile.fop -t abt-fop .

    - name: Configure test environment
      run: |
        echo "$PWD/bin" >> $GITHUB_PATH
        cp config/database.yml.sample config/database.yml
        ./bin/abt-fop-container -version || echo "FOP version check failed"

    - name: Setup database
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/abt_test
      run: |
        bundle exec rails db:create
        bundle exec rails db:migrate
        bundle exec rails db:seed

    - name: Verify development seeds
      env:
        RAILS_ENV: development
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/abt_development
      run: |
        bundle exec rails db:create
        bundle exec rails db:migrate
        bundle exec rails db:seed

    - name: Run tests
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/abt_test
        RAILS_LOG_LEVEL: debug
      run: |
        bundle exec rails test --verbose

    - name: Run UI tests
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/abt_test
        RAILS_LOG_LEVEL: debug
      run: |
        HEADLESS=1 bundle exec rails test:system --verbose

  stimulus-memory-leak-check:
    name: Stimulus Memory Leak Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Check Stimulus controllers for event listener leaks
      run: npm run lint

  fop-container:
    name: FOP Container Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Build FOP Docker container
      run: |
        podman build -f Dockerfile.fop -t abt-fop .

    - name: Test FOP is available
      run: |
        podman run --rm abt-fop fop -version

  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Run pre-commit hooks
      run: pre-commit run --all-files
