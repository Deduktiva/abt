de:
  date:
    formats:
      default: "%d.%m.%Y"
      timeframe_day: "%-d. %B %Y"
    month_names:
      [~, Jänner, Februar, März, April, Mai, Juni, Juli, August, September, Oktober, November, Dezember]

  mailers:
    overdue_invoices:
      subject: "[%{issuer_name}] %{count} überfällige Rechnung(en)"
      title: "Bericht über überfällige Rechnungen"
      heading: "Überfällige Rechnungen am %{date}"
      main_message: "Es gibt %{count} unbezahlte Rechnung(en), deren Fälligkeitsdatum überschritten ist."
      columns:
        invoice_number: "Rechnungsnr."
        customer: "Kunde"
        invoice_date: "Rechnungsdatum"
        due_date: "Fälligkeitsdatum"
        gross_amount: "Bruttobetrag"
        days_overdue: "Tage überfällig"
      short:
        invoice_date: "Datum:"
        due_date: "Fällig:"
        days_overdue: "%{days} Tage überfällig"

    expiring_offers:
      subject:
        one: "[%{issuer_name}] 1 abgelaufenes Angebot"
        other: "[%{issuer_name}] %{count} abgelaufene Angebote"
      title: "Bericht über abgelaufene Angebote"
      heading: "Abgelaufene Angebote am %{date}"
      main_message:
        one: "Ein Angebot ist abgelaufen."
        other: "Es gibt %{count} Angebote, deren Gültigkeit abgelaufen ist."
      columns:
        offer_number: "Angebotsnr."
        customer: "Kunde"
        expired_on: "Abgelaufen am"
        total: "Summe"
      short:
        expired_on: "Abgelaufen:"

    upcoming_offer_deliveries:
      subject:
        one: "[%{issuer_name}] 1 Angebotslieferung naht mit offener Verrechnung"
        other: "[%{issuer_name}] %{count} Angebotslieferungen nahen mit offener Verrechnung"
      title: "Bericht über anstehende Angebotslieferungen"
      heading: "Anstehende Angebotslieferungen am %{date}"
      main_message:
        one: "1 angenommenes Angebot braucht Verrechnungsaufmerksamkeit: Liefertermin innerhalb von 5 Tagen oder ein Meilenstein bei Auftrag ist noch nicht gebucht."
        other: "%{count} angenommene Angebote brauchen Verrechnungsaufmerksamkeit: Liefertermin innerhalb von 5 Tagen oder ein Meilenstein bei Auftrag ist noch nicht gebucht."
      columns:
        offer_number: "Angebotsnr."
        customer: "Kunde"
        delivery_date: "Liefertermin"
        missing: "Offen"
      short:
        delivery: "Lieferung:"
      status:
        unconverted:
          one: "1 Meilenstein nicht umgewandelt"
          other: "%{count} Meilensteine nicht umgewandelt"
        unbooked:
          one: "1 Rechnung nicht gebucht"
          other: "%{count} Rechnungen nicht gebucht"
        unsent:
          one: "1 Rechnung nicht versendet"
          other: "%{count} Rechnungen nicht versendet"

    invoice:
      subject: "%{issuer_name} Rechnung %{document_number}"
      greeting: "Sehr geehrte Damen und Herren,"
      main_message: "Anbei finden Sie die Rechnung für unsere erbrachten Leistungen. Bei Fragen dazu wenden Sie sich gerne an uns."
      document_number: "Rechnung %{document_number}"
      order_label: "Bestellung:"
      reference_label: "Referenz:"
      due_date_label: "Fälligkeitsdatum:"
      closing: "Vielen Dank für Ihr Vertrauen. Wir freuen uns auf die weitere Zusammenarbeit."

    delivery_note:
      subject: "%{issuer_name} Lieferschein %{document_number}"
      bulk_subject: "%{issuer_name} Lieferscheine %{document_numbers}"
      greeting: "Sehr geehrte Damen und Herren,"
      main_message: "Anbei finden Sie den Lieferschein für unsere erbrachten Leistungen. Bitte prüfen Sie die Lieferung und bestätigen Sie den Erhalt durch Unterzeichnung und Rücksendung des Lieferscheins."
      bulk_main_message: "Wir haben %{count} Lieferscheine für unsere erbrachten Leistungen beigefügt. Bitte prüfen Sie die Lieferung und bestätigen Sie den Erhalt durch Unterzeichnung und Rücksendung jedes Lieferscheins."
      bulk_document_list_title: "Lieferscheine:"
      bulk_next_steps:
        - "Abnahme der gelieferten Leistungen"
        - "Bestätigung der Leistungserbringung"
        - "Rücksendung der unterfertigten Lieferscheine per E-Mail"
      document_number: "Lieferschein %{document_number}"
      order_label: "Bestellung:"
      reference_label: "Referenz:"
      delivery_period_label: "Lieferzeitraum:"
      next_steps_title: "Nächste Schritte:"
      next_steps:
        - "Abnahme der gelieferten Leistungen"
        - "Bestätigung der Leistungserbringung"
        - "Rücksendung des unterfertigten Lieferscheins per E-Mail"
      next_steps_upload: "Unterfertigen Lieferschein hochladen"
      closing: "Vielen Dank für Ihr Vertrauen. Wir freuen uns auf die weitere Zusammenarbeit."

    offer:
      subject: "%{issuer_name} Angebot %{document_number}"
      greeting: "Sehr geehrte Damen und Herren,"
      main_message: "Anbei finden Sie unser Angebot für die beschriebenen Leistungen. Bei Fragen dazu wenden Sie sich gerne an uns."
      document_number: "Angebot %{document_number}"
      subject_label: "Betreff:"
      expires_label: "Gültig bis:"
      closing: "Wir freuen uns auf die Zusammenarbeit mit Ihnen."

    acceptance_submission:
      subject: "Neues Abnahmedokument für %{document_number}"
      body: "Ein Kunde hat ein unterschriebenes Abnahmedokument für Lieferschein %{document_number} hochgeladen. Bitte prüfen Sie es."
      cta: "Lieferschein prüfen"

  customer_contacts:
    salutation_line_hint: "In der Sprache des Kunden verfassen: %{language_name}"

  invoice_conversion:
    reference_line: "Lieferschein %{number} vom %{date}"

  delivery_notes:
    timeframe:
      connector: "bis"

  invoices:
    import:
      line_title: "IT-Beratung pro Stunde: %{project}"
      end_customer: "Endkunde: %{client}"
      month_year: "%{month} %{year}"

  customer_portal:
    pages:
      portal_title: "%{issuer} Dokumentenportal"
      portal_body: "Bitte verwenden Sie den Upload-Link aus der E-Mail, die wir Ihnen gesendet haben."
      not_found_title: "Hier gibt es nichts zu sehen"

    acceptance:
      title: "Abnahme für Lieferschein %{number}"
      dated: "Datiert %{date}"
      hint: "Nur PDF · maximal %{max} MB"
      submit: "Unterschriebene Abnahme senden"
      success_title: "Erhalten – vielen Dank"
      success_body: "Ihre unterschriebene Abnahme wurde empfangen und wird geprüft."
      errors:
        missing: "Bitte wählen Sie eine PDF-Datei zum Hochladen."
        not_pdf: "Es werden nur PDF-Dateien akzeptiert."
        too_large: "Die Datei ist zu groß – maximal %{max} MB."
      closed:
        invalid_title: "Dieser Link ist nicht mehr gültig"
        invalid_body: "Bitte kontaktieren Sie uns, falls Sie Ihre Abnahme noch senden möchten."
        accepted_title: "Bereits abgenommen"
        accepted_body: "Dieser Lieferschein wurde bereits abgenommen. Vielen Dank."
        capped_title: "Zu viele Uploads"
        capped_body: "Bitte kontaktieren Sie uns, um Ihre Abnahme auf anderem Weg zu senden."
