# Files in the config/locales directory are used for internationalization
# and are automatically loaded by Rails. If you want to use locales other
# than English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t 'hello'
#
# In views, this is aliased to just `t`:
#
#     <%= t('hello') %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# The following keys must be escaped otherwise they will not be retrieved by
# the default I18n backend:
#
# true, false, on, off, yes, no
#
# Instead, surround them with single quotes.
#
# en:
#   'true': 'foo'
#
# To learn more, please read the Rails Internationalization guide
# available at https://guides.rubyonrails.org/i18n.html.

en:
  date:
    formats:
      default: "%d.%m.%Y"
      timeframe_day: "%B %-d, %Y"
    month_names:
      [~, January, February, March, April, May, June, July, August, September, October, November, December]
  time:
    formats:
      default: "%d.%m.%Y %H:%M"

  # Override the auto-humanized model name (which would lowercase the second
  # word as "Delivery note"). "Delivery Note" is the title-cased spelling used
  # throughout the UI, and DeliveryNote#display_name reads model_name.human.
  activerecord:
    models:
      delivery_note: "Delivery Note"
    # country_iso2 is a 2-letter ISO 3166-1 alpha-2 code under the hood. Users
    # just see "Country" — the column suffix is a schema-level clarification,
    # not a UI label.
    attributes:
      customer:
        country_iso2: "Country"
      issuer_company:
        country_iso2: "Country"

  # Override Rails' default belongs_to required message ("must exist"),
  # which reads as a database/lookup error to end users. Required
  # belongs_to fields render as <select> dropdowns in our forms, so
  # phrase the failure as a selection problem instead.
  errors:
    messages:
      required: "must be selected"

  mailers:
    vat_verifications_report:
      subject: "[%{issuer_name}] VAT verification report — %{count} customer(s)"
      title: "VAT verification report"
      heading: "VAT verification report as of %{date}"
      newly_invalid_heading: "Newly invalid VAT IDs (%{count})"
      newly_invalid_main_message: "These customers' VAT IDs were rejected by VIES since the last report. Review their tax classification."
      stuck_unavailable_heading: "Stuck unavailable (%{count})"
      stuck_unavailable_main_message: "VIES has been unable to validate these customers for at least 7 days. Tax assessment is currently flying blind."
      empty_section_message: "(no events)"
      columns:
        customer: "Customer"
        vat_id: "VAT ID"
        checked_on: "Last checked"
        prior_state: "Prior state"
        error_code: "Error code"
      prior_state:
        was_valid: "was valid until %{date}"
        first_ever: "first confirmed invalid result"

    overdue_invoices:
      subject: "[%{issuer_name}] %{count} overdue invoice(s)"
      title: "Overdue invoices report"
      heading: "Overdue invoices as of %{date}"
      main_message: "There are %{count} unpaid invoice(s) past their due date."
      columns:
        invoice_number: "Invoice no."
        customer: "Customer"
        invoice_date: "Invoice date"
        due_date: "Due date"
        gross_amount: "Gross amount"
        days_overdue: "Days overdue"
      short:
        invoice_date: "Date:"
        due_date: "Due:"
        days_overdue: "%{days} days overdue"

    expiring_offers:
      subject:
        one: "[%{issuer_name}] 1 expired offer"
        other: "[%{issuer_name}] %{count} expired offers"
      title: "Expired offers report"
      heading: "Expired offers as of %{date}"
      main_message:
        one: "There is 1 offer whose validity has expired."
        other: "There are %{count} offers whose validity has expired."
      columns:
        offer_number: "Offer no."
        customer: "Customer"
        expired_on: "Expired on"
        total: "Total"
      short:
        expired_on: "Expired:"

    upcoming_offer_deliveries:
      subject:
        one: "[%{issuer_name}] 1 offer delivery nearing with open invoicing"
        other: "[%{issuer_name}] %{count} offer deliveries nearing with open invoicing"
      title: "Upcoming offer deliveries report"
      heading: "Offer deliveries nearing as of %{date}"
      main_message:
        one: "1 accepted offer needs invoicing attention: delivery is within 5 days or an on-order milestone is not yet booked."
        other: "%{count} accepted offers need invoicing attention: delivery is within 5 days or an on-order milestone is not yet booked."
      columns:
        offer_number: "Offer no."
        customer: "Customer"
        delivery_date: "Delivery date"
        missing: "Missing"
      short:
        delivery: "Delivery:"
      status:
        unconverted:
          one: "1 milestone not converted"
          other: "%{count} milestones not converted"
        unbooked:
          one: "1 invoice not booked"
          other: "%{count} invoices not booked"
        unsent:
          one: "1 invoice not sent"
          other: "%{count} invoices not sent"

    invoice:
      subject: "%{issuer_name} Invoice %{document_number}"
      greeting: "Dear %{customer_name},"
      main_message: "We've attached your invoice for the services provided. Please review the details and let us know if you have any questions."
      document_number: "Invoice %{document_number}"
      order_label: "Order:"
      reference_label: "Reference:"
      due_date_label: "Due date:"
      closing: "Thank you for your business. We appreciate your continued partnership."

    delivery_note:
      subject: "%{issuer_name} Delivery Note %{document_number}"
      bulk_subject: "%{issuer_name} Delivery Notes %{document_numbers}"
      greeting: "Dear %{customer_name},"
      main_message: "We've attached your delivery note for the services provided. Please review the details and confirm receipt by signing and returning the delivery note."
      bulk_main_message: "We've attached %{count} delivery notes for the services provided. Please review the details and confirm receipt by signing and returning each delivery note."
      bulk_document_list_title: "Delivery Notes:"
      bulk_next_steps:
        - "Please review each delivery note and verify all details are correct"
        - "Sign each delivery note to confirm acceptance of the delivered services"
        - "Return the signed delivery notes to us via email"
      document_number: "Delivery Note %{document_number}"
      order_label: "Order:"
      reference_label: "Reference:"
      delivery_period_label: "Delivery Period:"
      next_steps_title: "Next Steps:"
      next_steps:
        - "Please review the delivery note and verify all details are correct"
        - "Sign the delivery note to confirm acceptance of the delivered services"
        - "Return the signed delivery note to us via email"
      next_steps_upload: "Upload the signed delivery note"
      closing: "Thank you for your business. We appreciate your continued partnership."

    offer:
      subject: "%{issuer_name} Offer %{document_number}"
      greeting: "Dear %{customer_name},"
      main_message: "We've attached our offer for the services described below. Please review the details and let us know if you have any questions."
      document_number: "Offer %{document_number}"
      subject_label: "Subject:"
      expires_label: "Valid until:"
      closing: "We look forward to working with you."

    acceptance_submission:
      subject: "New acceptance document for %{document_number}"
      body: "A customer uploaded a signed acceptance document for delivery note %{document_number}. Please review it."
      cta: "Review the delivery note"

  customer_contacts:
    salutation_line_hint: "Write in the customer's language: %{language_name}"

  invoice_conversion:
    reference_line: "Delivery Note %{number}, Date: %{date}"

  delivery_notes:
    timeframe:
      connector: "to"

  invoices:
    import:
      line_title: "IT Consulting per hour: %{project}"
      end_customer: "End client: %{client}"
      month_year: "%{month} %{year}"

  customer_portal:
    pages:
      portal_title: "%{issuer} document portal"
      portal_body: "Please use the upload link from the email we sent you."
      not_found_title: "Nothing to see here"

    acceptance:
      title: "Acceptance for Delivery Note %{number}"
      dated: "Dated %{date}"
      hint: "PDF only · maximum %{max} MB"
      submit: "Submit signed acceptance"
      success_title: "Received — thank you"
      success_body: "Your signed acceptance was received and is pending review."
      errors:
        missing: "Please choose a PDF file to upload."
        not_pdf: "Only PDF files are accepted."
        too_large: "File is too large — maximum %{max} MB."
      closed:
        invalid_title: "This link is no longer valid"
        invalid_body: "Please contact us if you still need to send your acceptance."
        accepted_title: "Already accepted"
        accepted_body: "This delivery note has already been accepted. Thank you."
        capped_title: "Too many uploads"
        capped_body: "Please contact us to send your acceptance another way."
