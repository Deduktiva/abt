fop:
  # Containerized FOP launcher (tracked at bin/abt-fop-container). Needs
  # podman/docker plus the abt-fop image, which bin/setup-fop builds.
  # To run FOP natively instead (Debian: apt install fop libsaxonb-java),
  # override via config/settings/development.local.yml with
  # binary_path: "./bin/abt-fop".
  binary_path: "./bin/abt-fop-container"

customer_portal:
  host: 'customer-portal.localhost'
