fop:
  # Containerized FOP launcher (tracked at bin/abt-fop-container). Needs
  # podman/docker plus the abt-fop image, which bin/setup-fop builds.
  # To run FOP natively instead (requires fop + libsaxonb-java packages),
  # override via config/settings/test.local.yml with
  # binary_path: "./bin/abt-fop".
  binary_path: "./bin/abt-fop-container"

payments:
  public_url: 'https://example.com/pay/%token%'

app:
  host: 'www.example.com'
  protocol: 'http'

webauthn:
  rp_name: 'ABT Test'
  rp_id: 'www.example.com'
  origin: 'http://www.example.com'

customer_portal:
  host: 'customer-portal.example.test'
