# ABT Apache include — app-owned directives.
#
# Pull this file into the site's VirtualHost via:
#   Include /srv/abt/deploy/apache/abt-app.conf
#
# Requires: mod_proxy, mod_proxy_http, mod_headers, mod_alias.

# Public customer portal host. Same app, Rails host-constrained routes do
# the isolation. Requires a SAN/wildcard cert covering this name.
ServerAlias customer-portal.example.com

DocumentRoot /srv/abt/public

<Directory /srv/abt/public>
  Require all granted
  Options -Indexes
  AllowOverride None
</Directory>

# Precompiled assets carry fingerprints in their filenames, so serve them
# with a far-future immutable Cache-Control. Apache returns them directly.
<Directory /srv/abt/public/assets>
  Header set Cache-Control "public, max-age=31536000, immutable"
</Directory>

# Reverse proxy to Puma over a Unix socket.
#
# X-Forwarded-Proto MUST be `RequestHeader set` (not setifempty) — the value
# is load-bearing for Rails' request.scheme / force_ssl logic, and `set`
# overrides any client-supplied header so it cannot be spoofed. The matching
# trusted_proxies configuration lives in config/environments/production.rb;
# do not edit one of these without checking the other.
#
# Other inbound forwarded headers are unset so a client cannot influence
# Rails/Rack scheme, host, or proxy detection. We only need X-Forwarded-Proto
# (which we set ourselves) and X-Forwarded-For (which mod_proxy appends to
# automatically and is consumed by ActionDispatch::RemoteIp under
# trusted_proxies).
ProxyPreserveHost On
RequestHeader set   X-Forwarded-Proto "https"
RequestHeader unset X-Forwarded-Host
RequestHeader unset X-Forwarded-Ssl
RequestHeader unset X-Original-URL
RequestHeader unset X-Rewrite-URL
RequestHeader unset Forwarded

# Short-circuit static paths so Apache serves them from DocumentRoot directly
# rather than proxying every asset hit to Puma. Order matters: ProxyPass
# exclusions must come before the catch-all ProxyPass below.
ProxyPass /assets                       !
ProxyPass /favicon.ico                  !
ProxyPass /robots.txt                   !
ProxyPass /apple-touch-icon.png         !
ProxyPass /apple-touch-icon-precomposed.png !

ProxyPass        / http://127.0.0.1:3000/
ProxyPassReverse / http://127.0.0.1:3000/

# Bump proxy timeout: invoice/delivery-note PDF previews shell out to Apache
# FOP and can run for several seconds. Default ProxyTimeout follows Apache's
# Timeout (typically 60s) — leave room for slow PDFs.
ProxyTimeout 120
