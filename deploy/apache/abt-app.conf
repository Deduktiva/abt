# ABT Apache include — app-owned directives.
#
# Pull this file into the site's VirtualHost via:
#   Include /srv/abt/deploy/apache/abt-app.conf
#
# Requires: mod_proxy, mod_proxy_http, mod_headers, mod_alias.

DocumentRoot /srv/abt/public

<Directory /srv/abt/public>
  Require all granted
  Options -Indexes
  AllowOverride None
</Directory>

# Precompiled assets carry fingerprints in their filenames, so serve them
# with a far-future immutable Cache-Control. Apache returns them directly
# without ever touching Puma.
<Directory /srv/abt/public/assets>
  Header set Cache-Control "public, max-age=31536000, immutable"
</Directory>
<Directory /srv/abt/public/packs>
  Header set Cache-Control "public, max-age=31536000, immutable"
</Directory>

SetEnv FOP_EXTRA_JAR_PATH /srv/fop-extra-jars

# Reverse proxy to Puma over a Unix socket.
#
# X-Forwarded-Proto MUST be `RequestHeader set` (not setifempty) — the value
# is load-bearing for Rails' request.scheme / force_ssl logic, and `set`
# overrides any client-supplied header so it cannot be spoofed. The matching
# trusted_proxies configuration lives in config/environments/production.rb;
# do not edit one of these without checking the other.
ProxyPreserveHost On
RequestHeader set X-Forwarded-Proto "https"

ProxyPass        / "unix:/srv/abt/tmp/sockets/puma.sock|http://localhost/"
ProxyPassReverse / "unix:/srv/abt/tmp/sockets/puma.sock|http://localhost/"
