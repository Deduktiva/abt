# A simple fixture for tests that need a registered credential. The
# external_id / public_key here are placeholder strings — tests that
# exercise the real WebAuthn verify path use WebAuthn::FakeClient and
# create credentials at runtime, not via fixtures.
alice_laptop:
  user: alice
  external_id: alice-fake-credential-id-aaaa
  public_key: alice-fake-public-key-aaaa
  sign_count: 0
  nickname: "Test laptop"
  transports: ["internal"]
  last_used_at: <%= 1.hour.ago.to_formatted_s(:db) %>
